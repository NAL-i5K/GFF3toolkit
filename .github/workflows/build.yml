name: build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build1-Calculating-coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install coveralls coverage codecov wheel
          python -m pip install .
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
      - name: Test with coverage
        run: |
          coverage erase
          coverage run -a tests.py
          coverage run -a -m unittest discover -s tests/unit -p "test_*.py"
      - name: after success
        env: 
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          coverage report -m
          coveralls --service=github
          codecov
  
  build2-Checking-links:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.0"
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
      - name: Install dependencies
        run: gem install awesome_bot
      - name: Checking links
        run: awesome_bot --allow-redirect --allow-dupe README.md docs/*.md
          
  build3-Testing-functions:
    strategy:
      fail-fast: false
      matrix:
        os: ['ubuntu-latest', 'windows-latest', 'macos-latest']
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install wheel
          python -m pip install .
      - name: Run smoke tests
        run: python tests.py
