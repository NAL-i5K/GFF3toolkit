name: build

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PIP_NO_CACHE_DIR: "1"

jobs:
  build1-Calculating-coverage:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5
      - name: Set up Python 3.9
        uses: actions/setup-python@v6
        with:
          python-version: "3.9"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install coveralls coverage codecov wheel
          python -m pip install .
          if [ -f requirements.txt ]; then python -m pip install -r requirements.txt; fi
      - name: Test with coverage
        run: |
          coverage erase
          coverage run -a tests.py
          coverage run -a -m unittest discover -s tests/unit -p "test_*.py"
      - name: after success
        env: 
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          coverage report --fail-under=22 -m
          coveralls --service=github
          codecov
  
  build2-Checking-links:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.0"
          bundler-cache: true # runs 'bundle install' and caches installed gems automatically
      - name: Install dependencies
        run: gem install awesome_bot
      - name: Checking links
        run: awesome_bot --allow-redirect --allow-dupe README.md docs/*.md
          
  build3-Testing-functions:
    strategy:
      fail-fast: false
      matrix:
        os: ['ubuntu-24.04', 'windows-2025-vs2026', 'macos-latest']
    runs-on: ${{ matrix.os }}
    
    steps:
      - uses: actions/checkout@v5
      - name: Set up Python 3.9
        uses: actions/setup-python@v6
        with:
          python-version: "3.9"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install wheel
          python -m pip install .
      - name: Run smoke tests
        run: python tests.py

  build4-Packaging-check:
    strategy:
      fail-fast: false
      matrix:
        os: ['ubuntu-24.04', 'windows-2025-vs2026', 'macos-latest']
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v5
      - name: Set up Python 3.9
        uses: actions/setup-python@v6
        with:
          python-version: "3.9"
      - name: Build distribution artifacts
        run: |
          python -m pip install --upgrade pip
          python -m pip install build wheel
          python -m build
      - name: Install wheel and verify CLI entry points
        run: |
          python -c "import glob,subprocess,sys; wheels=glob.glob('dist/*.whl'); assert wheels, 'No wheel built'; subprocess.check_call([sys.executable, '-m', 'pip', 'install', wheels[0]])"
          python -m gff3tool.bin.gff3_sort -h
          python -c "import shutil,sys; sys.exit(0 if shutil.which('gff3_sort') else 1)"

  build5-Docs-build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5
      - name: Set up Python 3.14
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install docs dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r docs/requirements.txt
          python -m pip install .
      - name: Build docs (warnings as errors)
        run: |
          python -m sphinx -W -b html docs docs/_build/html
